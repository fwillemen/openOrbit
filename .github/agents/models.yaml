# Fleet Agent Model Configuration
# Maps each agent role to its preferred LLM model.
# Scrum Master reads this file and passes `Preferred model: <model>` in each delegation prompt.
# Override any role at invocation time by specifying a different model in the prompt.
#
# Rate cards (approximate 2025/2026 pricing per 1K tokens):
# Update these as pricing changes.

models:
  architect:
    model: "anthropic/claude-sonnet-4-5"
    rationale: "Complex reasoning, ADR writing, system design — needs highest capability"
    rate_per_1k_input: 0.003
    rate_per_1k_output: 0.015

  programmer:
    model: "openai/gpt-4o"
    rationale: "Strong Python coder, good at type annotations and test writing"
    rate_per_1k_input: 0.0025
    rate_per_1k_output: 0.010

  code-reviewer:
    model: "google/gemini-2.0-flash"
    rationale: "Fast and cheap — code review is mostly pattern matching, not deep reasoning"
    rate_per_1k_input: 0.0001
    rate_per_1k_output: 0.0004

  tester:
    model: "google/gemini-2.0-flash"
    rationale: "Mostly runs shell commands — minimal LLM reasoning needed"
    rate_per_1k_input: 0.0001
    rate_per_1k_output: 0.0004

  docs-writer:
    model: "openai/gpt-4o-mini"
    rationale: "Good writing quality, cost-effective for documentation tasks"
    rate_per_1k_input: 0.00015
    rate_per_1k_output: 0.0006

  retrospective:
    model: "anthropic/claude-sonnet-4-5"
    rationale: "Pattern recognition and analytical synthesis benefit from high-capability model"
    rate_per_1k_input: 0.003
    rate_per_1k_output: 0.015

  scrum-master:
    model: "openai/gpt-4o"
    rationale: "Coordination and structured delegation — solid mid-tier model"
    rate_per_1k_input: 0.0025
    rate_per_1k_output: 0.010

  product-owner:
    model: "openai/gpt-4o"
    rationale: "Backlog analysis and prioritization — needs good reasoning"
    rate_per_1k_input: 0.0025
    rate_per_1k_output: 0.010

# Default sprint budget
defaults:
  sprint_budget_usd: 5.00
  warn_at_pct: 80
